
apiVersion: apps/v1
kind: Deployment
metadata:
  name: borrow-service
  namespace: flm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: borrow-service
  template:
    metadata:
      labels:
        app: borrow-service
    spec:
      containers:
        - name: borrow-service
          image: shashankkambala/python1:borrowimage
          ports:
            - containerPort: 5003
          env:
            - name: DB_HOST
              value: "db"
            - name: DB_PORT
              value: "3306"
---
apiVersion: v1
kind: Service
metadata:
  name: borrow-service
  namespace: flm
spec:
  selector:
    app: borrow-service
  ports:
    - port: 5003
      targetPort: 5003
  type: ClusterIP
